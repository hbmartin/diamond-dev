name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  lint-type-test:
    name: Lint, type check, and test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      pylint_exit_code: ${{ steps.pylint.outputs.exit_code }}

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync --locked --all-groups

      - name: Run Ruff
        run: uv run ruff check diamond_dev

      - name: Run Pylint
        id: pylint
        continue-on-error: true
        shell: bash
        run: |
          set +e
          uv run pylint diamond_dev > pylint-report.txt 2>&1
          exit_code=$?
          cat pylint-report.txt
          echo "exit_code=${exit_code}" >> "${GITHUB_OUTPUT}"
          exit "${exit_code}"

      - name: Upload Pylint report
        if: steps.pylint.outputs.exit_code != '0'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pylint-report
          path: pylint-report.txt
          if-no-files-found: error
          retention-days: 1

      - name: Fail if Pylint failed
        if: steps.pylint.outputs.exit_code != '0'
        env:
          EXIT_CODE: ${{ steps.pylint.outputs.exit_code }}
        run: exit "$EXIT_CODE"

      - name: Run Pyrefly
        run: uv run pyrefly check diamond_dev

      - name: Run ty
        run: uv run ty check diamond_dev

      - name: Run duplicate analysis
        run: uv run lizard -Eduplicate diamond_dev

      - name: Run tests with coverage
        run: uv run pytest tests/ --cov=diamond_dev --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: coverage.xml
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  pylint-pr-comment:
    name: Comment on PR when Pylint fails
    needs: lint-type-test
    if: ${{ always() && github.event_name == 'pull_request' && needs.lint-type-test.outputs.pylint_exit_code != '' && needs.lint-type-test.outputs.pylint_exit_code != '0' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Needed for the gh pr comment step below.
      pull-requests: write

    steps:
      - name: Download Pylint report
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: pylint-report

      - name: Comment on PR when Pylint fails
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          {
            echo "## Pylint failed"
            echo
            echo "Pylint failed in ${GITHUB_WORKFLOW} for ${GITHUB_SHA}."
            echo
            echo '```text'
            tail -c 60000 pylint-report.txt
            echo '```'
          } > pylint-pr-comment.md
          gh pr comment "${PR_NUMBER}" --body-file pylint-pr-comment.md
