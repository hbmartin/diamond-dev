name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-type-test:
    name: Lint, type check, and test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync --locked --all-groups

      - name: Run Ruff
        run: uv run ruff check diamond_dev

      - name: Run Pyrefly
        run: uv run pyrefly check diamond_dev

      - name: Run ty
        run: uv run ty check diamond_dev

      - name: Run duplicate analysis
        run: uv run lizard -Eduplicate diamond_dev

      - name: Run tests with coverage
        run: uv run pytest tests/ --cov=diamond_dev --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
