name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-type-test:
    name: Lint, type check, and test
    runs-on: ubuntu-latest
    outputs:
      pylint_exit_code: ${{ steps.pylint.outputs.exit_code }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync --locked --all-groups

      - name: Run Ruff
        run: uv run ruff check diamond_dev

      - name: Run Pylint
        id: pylint
        continue-on-error: true
        shell: bash
        run: |
          set +e
          uv run pylint diamond_dev > pylint-report.txt 2>&1
          exit_code=$?
          cat pylint-report.txt
          echo "exit_code=${exit_code}" >> "${GITHUB_OUTPUT}"
          exit "${exit_code}"

      - name: Upload Pylint report
        if: steps.pylint.outputs.exit_code != '0'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: pylint-report
          path: pylint-report.txt
          if-no-files-found: error
          retention-days: 1

      - name: Fail if Pylint failed
        if: steps.pylint.outputs.exit_code != '0'
        env:
          EXIT_CODE: ${{ steps.pylint.outputs.exit_code }}
        run: exit "$EXIT_CODE"

      - name: Run Pyrefly
        run: uv run pyrefly check diamond_dev

      - name: Run ty
        run: uv run ty check diamond_dev

      - name: Run duplicate analysis
        run: uv run lizard -Eduplicate diamond_dev

      - name: Run tests with coverage
        run: uv run pytest tests/ --cov=diamond_dev --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  pylint-pr-comment:
    name: Comment on PR when Pylint fails
    needs: lint-type-test
    if: ${{ always() && github.event_name == 'pull_request' && needs.lint-type-test.outputs.pylint_exit_code != '' && needs.lint-type-test.outputs.pylint_exit_code != '0' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Needed for the gh pr comment step below.
      pull-requests: write

    steps:
      - name: Download Pylint report
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: pylint-report

      - name: Comment on PR when Pylint fails
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          {
            echo "## Pylint failed"
            echo
            echo "Pylint failed in ${GITHUB_WORKFLOW} for ${GITHUB_SHA}."
            echo
            echo '```text'
            tail -c 60000 pylint-report.txt
            echo '```'
          } > pylint-pr-comment.md
          gh pr comment "${PR_NUMBER}" --body-file pylint-pr-comment.md
