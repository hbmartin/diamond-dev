rules:
  - id: diamond-dev.path-exists-before-read-text
    languages:
      - python
    message: Use Path.is_file() before read_text() when the path is expected to be a file.
    severity: WARNING
    pattern: |
      if $PATH.exists():
          ...
          $PATH.read_text(...)

  - id: diamond-dev.safe-generated-child-path-derived-name-sink
    languages:
      - python
    message: Use a literal or validated generated filename at generated filesystem sinks instead of deriving it from Path.name.
    severity: ERROR
    patterns:
      - pattern-either:
          - pattern: |
              $TARGET = safe_generated_child_path($DIR, $SOURCE.name)
              ...
              $TARGET.read_text(...)
          - pattern: |
              $TARGET = safe_generated_child_path($DIR, $SOURCE.name)
              ...
              $TARGET.write_text(...)
          - pattern: |
              $TARGET = safe_generated_child_path($DIR, $SOURCE.name)
              ...
              shutil.copy2($TARGET, ...)

  - id: diamond-dev.safe-child-path-raw-child-name-join
    languages:
      - python
    message: Validate the child path argument before joining it with a parent directory.
    severity: ERROR
    patterns:
      - pattern-either:
          - pattern-inside: |
              def safe_child_path($DIRECTORY, $CHILD_NAME):
                  ...
          - pattern-inside: |
              def safe_generated_child_path($DIRECTORY, $CHILD_NAME):
                  ...
      - pattern-either:
          - pattern: $DIRECTORY / $CHILD_NAME
          - pattern: $DIRECTORY.joinpath($CHILD_NAME)
